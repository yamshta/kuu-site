<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7faff" />
    <meta name="robots" content="index,follow" />
    <title>KUU — Brain Dump for Busy Minds</title>
    <meta
      name="description"
      content="KUU は、頭の中を口に出すだけで「いま見る / あとで考える / 寝かせる / 手放す」に整える、静かなブレインダンプアプリです。"
    />
    <meta property="og:title" content="KUU — Brain Dump for Busy Minds" />
    <meta
      property="og:description"
      content="頭の中を口に出すだけで整える、静かなブレインダンプアプリ。"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kuu-zen.com/" />
    <link rel="canonical" href="https://kuu-zen.com/" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f7faff;
        --ink: #1e2530;
        --ink-soft: #4f5b6b;
        --accent: #6c8fb5;
        --card: #ffffff;
        --line: #e4ecf4;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans",
          "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      main {
        max-width: 640px;
        margin: 0 auto;
        padding: clamp(56px, 12vw, 120px) 24px 80px;
      }
      h1 {
        font-size: clamp(32px, 6vw, 44px);
        font-weight: 600;
        letter-spacing: 0.02em;
        margin: 0 0 12px;
      }
      .tagline {
        color: var(--ink-soft);
        font-size: 17px;
        line-height: 1.7;
        margin: 0 0 40px;
      }
      .quadrants {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 24px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 40px;
      }
      .q {
        font-size: 14px;
        color: var(--ink-soft);
        line-height: 1.6;
      }
      .q strong {
        display: block;
        color: var(--ink);
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .cta {
        display: inline-block;
        padding: 14px 28px;
        background: var(--ink);
        color: #fff;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 500;
        font-size: 15px;
      }
      .cta[aria-disabled="true"] {
        background: var(--line);
        color: var(--ink-soft);
        pointer-events: none;
      }
      footer {
        margin-top: 64px;
        padding-top: 24px;
        border-top: 1px solid var(--line);
        font-size: 13px;
        color: var(--ink-soft);
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
      }
      footer a {
        color: var(--ink-soft);
        text-decoration: none;
      }
      footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>KUU</h1>
      <p class="tagline">
        頭の中を口に出すだけ。<br />
        AI が、いま見る / あとで考える / 寝かせる / 手放す に静かに分けてくれます。
      </p>

      <section class="quadrants" aria-label="KUU マトリクス">
        <div class="q"><strong>いま見る</strong>今日ふれるもの</div>
        <div class="q"><strong>あとで考える</strong>時間ができたら</div>
        <div class="q"><strong>寝かせる</strong>急がない</div>
        <div class="q"><strong>手放す</strong>気にしなくていい</div>
      </section>

      <a class="cta" aria-disabled="true" href="#">App Store 近日公開</a>

      <footer>
        <a href="/support/">サポート</a>
        <a href="/privacy/">プライバシー</a>
        <span>© KUU</span>
      </footer>
    </main>
  </body>
</html>
