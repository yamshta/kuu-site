      <h1>지원</h1>
      <p>KUU를 이용해 주셔서 감사합니다. 문의나 문제 신고는 아래로 연락 주세요.</p>

      <h2>문의</h2>
      <p>곧 전용 지원 창구를 안내드립니다.</p>

      <h2>자주 묻는 질문</h2>
      <p>
        <strong>음성이 저장되나요?</strong><br />
        아닙니다. KUU는 음성을 기기 밖으로 보내지 않으며, 인식이 완료되면 임시 음성 파일을 즉시 삭제합니다. 텍스트와 분류 결과만 남습니다.
      </p>
      <p>
        <strong>iCloud 동기화는 되나요?</strong><br />
        네. 노트는 사용자 본인만 접근할 수 있는 iCloud Private DB에 동기화됩니다. 개발자가 운영하는 서버는 없습니다.
      </p>
