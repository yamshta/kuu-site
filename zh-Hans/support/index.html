<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>支持 — KUU</title>
    <meta name="description" content="KUU 的联系方式和常见问题。" />
    <link rel="canonical" href="https://kuu-zen.com/zh-Hans/support/" />
    <meta property="og:locale" content="zh_CN" />
    <style>
:root {
  color-scheme: light;
  --bg: #f7faff;
  --ink: #1e2530;
  --ink-soft: #4f5b6b;
  --line: #e4ecf4;
}
body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Apple SD Gothic Neo", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}
main {
  max-width: 640px;
  margin: 0 auto;
  padding: clamp(48px, 10vw, 96px) 24px 80px;
}
h1 { font-size: 28px; font-weight: 600; margin: 0 0 24px; }
h2 { font-size: 18px; font-weight: 600; margin: 32px 0 8px; }
p { line-height: 1.7; color: var(--ink-soft); margin: 0 0 12px; }
a { color: var(--ink); }
.back {
  display: inline-block;
  margin-top: 48px;
  padding-top: 24px;
  border-top: 1px solid var(--line);
  color: var(--ink-soft);
  text-decoration: none;
  font-size: 14px;
}
.langs {
  margin-top: 48px;
  padding-top: 16px;
  border-top: 1px dashed var(--line);
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  font-size: 12px;
}
.langs a { color: var(--ink-soft); text-decoration: none; }
.langs a[aria-current="true"] { color: var(--ink); font-weight: 600; }
.langs a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <main>
      <h1>支持</h1>
      <p>感谢使用 KUU。如有疑问或需要反馈问题,请通过下面的方式联系。</p>

      <h2>联系</h2>
      <p>我们将很快开放支持渠道。</p>

      <h2>常见问题</h2>
      <p>
        <strong>我的语音会被保存吗?</strong><br />
        不会。KUU 不会将音频传输到设备外,识别完成后会立即删除临时音频文件。仅保留转录结果和分类结果。
      </p>
      <p>
        <strong>是否通过 iCloud 同步?</strong><br />
        是的。笔记会同步到只有您本人可访问的 iCloud 私有数据库。我们没有任何开发者服务器。
      </p>

      <a class="back" href="/zh-Hans/">← 返回顶部</a>

      <nav class="langs" aria-label="语言">

      <a href="/en/support/" hreflang="en">English</a>
      <a href="/es/support/" hreflang="es">Español</a>
      <a href="/ko/support/" hreflang="ko">한국어</a>
      <a href="/zh-Hans/support/" hreflang="zh-Hans" aria-current="true">简体中文</a>
      </nav>
    </main>
  </body>
</html>
