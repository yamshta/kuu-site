<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>サポート — KUU</title>
    <meta name="description" content="KUU のサポートに関するお問い合わせ先と FAQ。" />
    <link rel="canonical" href="https://kuu-zen.com/support/" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f7faff;
        --ink: #1e2530;
        --ink-soft: #4f5b6b;
        --line: #e4ecf4;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans",
          "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      main {
        max-width: 640px;
        margin: 0 auto;
        padding: clamp(48px, 10vw, 96px) 24px 80px;
      }
      h1 {
        font-size: 28px;
        font-weight: 600;
        margin: 0 0 24px;
      }
      h2 {
        font-size: 18px;
        font-weight: 600;
        margin: 32px 0 8px;
      }
      p {
        line-height: 1.7;
        color: var(--ink-soft);
        margin: 0 0 12px;
      }
      a {
        color: var(--ink);
      }
      .back {
        display: inline-block;
        margin-top: 48px;
        padding-top: 24px;
        border-top: 1px solid var(--line);
        color: var(--ink-soft);
        text-decoration: none;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>サポート</h1>
      <p>
        KUU をご利用いただきありがとうございます。ご不明な点や不具合のご報告は、下記までご連絡ください。
      </p>

      <h2>お問い合わせ</h2>
      <p>サポート窓口は近日公開予定です。</p>

      <h2>よくある質問</h2>
      <p>
        <strong>声は保存されますか？</strong><br />
        いいえ。KUU は音声を端末から外に出さず、認識が完了したら一時音声ファイルを削除します。残るのは文字起こしと分類結果のみです。
      </p>
      <p>
        <strong>iCloud 同期は？</strong><br />
        iCloud Private DB に同期されます (Apple ID 所有者本人のみアクセス可)。開発者サーバーはありません。
      </p>

      <a class="back" href="/">← トップへ</a>
    </main>
  </body>
</html>
